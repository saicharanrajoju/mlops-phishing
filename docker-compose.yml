# PhishSentinel local stack:
#   - mlflow : tracking server + Model Registry (sqlite backend, served artifacts)
#   - app    : FastAPI serving layer, points at the mlflow service
#
# Usage:
#   cp .env.example .env   # add your GEMINI_API_KEY (optional; falls back to mock)
#   docker compose up --build
#   open http://localhost:8000   and click "Trigger Training Pipeline"
#   mlflow UI at http://localhost:5000

services:
  mlflow:
    build: .
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts
      --host 0.0.0.0
      --port 5000
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow

  app:
    build: .
    command: uvicorn app:app --host 0.0.0.0 --port 8000
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      HOST: 0.0.0.0
      PORT: "8000"
    env_file:
      - path: .env
        required: false
    depends_on:
      - mlflow
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data        # mount dataset so the training subprocess can read it

volumes:
  mlflow-data:
